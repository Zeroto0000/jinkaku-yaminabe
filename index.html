<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>人格闇鍋</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>人格闇鍋</h1>
      <p>匿名で人格を合成しろ</p>
    </header>

    <!-- ロビー -->
    <section id="lobby" class="card">
      <h2>はじめる</h2>

      <label>
        名前
        <input id="nameInput" type="text" placeholder="例：24" maxlength="12" />
      </label>

      <button id="createRoomBtn">部屋を作る</button>

      <div class="divider">または</div>

      <label>
        部屋ID
        <input id="roomIdInput" type="text" placeholder="例：ABC123" maxlength="6" />
      </label>

      <button id="joinRoomBtn" class="sub">部屋に参加する</button>

      <p id="lobbyMessage" class="message"></p>
    </section>

    <!-- 待機画面 -->
    <section id="waiting" class="card hidden">
      <h2>待機中</h2>

      <div class="room-box">
        <p>部屋ID</p>
        <div class="room-id-row">
          <strong id="roomIdText">------</strong>
          <button id="copyRoomIdBtn" class="mini">コピー</button>
        </div>
      </div>

      <h3>参加者</h3>
      <ul id="playerList" class="player-list"></ul>

 <div id="hostArea" class="host-area hidden">
  <button id="startGameBtn">ゲーム開始</button>
</div>
      <p id="waitingMessage" class="message"></p>
    </section>



  

  <!-- お題提出画面 -->
<section id="topicSubmit" class="card hidden">
  <h2>お題を出す</h2>

  <p>全員がお題を1つずつ提出します。</p>

  <label>
    お題
    <input id="myTopicInput" type="text" placeholder="例：恋愛失敗しそうな人" />
  </label>

  <button id="submitTopicBtn">お題を提出する</button>

  <p id="topicSubmitMessage" class="message"></p>
</section>


  

  <!-- カード選択画面 -->
<section id="selecting" class="card hidden">
  <h2>カードを選ぶ</h2>

  <p class="topic">
    今回のテーマ：<strong id="selectingTopicText"></strong>
  </p>

  <p>手札から3枚選んで、人格を合成しよう。</p>

  <div id="handArea" class="hand-area"></div>

  <button id="submitCardsBtn">この3枚で合成する</button>

  <div id="myResultArea" class="result-box hidden">
    <h3 id="myResultTitle"></h3>
    <p id="myResultText"></p>
  </div>

  <p id="selectingMessage" class="message"></p>
</section>

  <!-- 匿名公開画面 -->
<section id="revealing" class="card hidden">
  <h2>匿名公開</h2>

  <p class="topic">
    今回のテーマ：<strong id="revealingTopicText"></strong>
  </p>

  <div id="anonymousResults" class="anonymous-results"></div>

<h3>一番おもしろい人格に投票</h3>
<div id="voteArea" class="vote-area"></div>

<p id="revealingMessage" class="message"></p>
</section>

<!-- 結果発表画面 -->
<section id="result" class="card hidden">
  <h2>結果発表</h2>

  <p class="topic">
    今回のテーマ：<strong id="resultTopicText"></strong>
  </p>

  <div id="resultArea" class="anonymous-results"></div>

  <button id="playAgainBtn">もう一回遊ぶ</button>

  <p id="resultMessage" class="message"></p>
</section>

      </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
